general {
  disable_loading_bar = true
  grace = 0
  hide_cursor = true
  no_fade_in = false
}

background {
  monitor = 
  path = $HOME/Downloads/test.jpeg
  color = rgba(25, 20, 20, 1.0)
  blur_size = 8
  blur_passes = 3
  noise = 0.011700
  contrast = 0.891600
  brightness = 0.817200
  vibrancy = 0.169600
  vibrancy_darkness = 0.000000
}


input-field {
  monitor = 
  size = 250, 60
  outline_thickness = 2
  dots_size = 0.200000
  dots_spacing = 0.200000
  dots_center = true
  dots_rounding = -1
  outer_color = rgba(0, 0, 0, 0)
  inner_color = rgba(0, 0, 0, 0.5)
  font_color = rgb(200, 200, 200)
  fade_on_empty = true
  fade_timeout = 1000
  placeholder_text = <i><span foreground="##cdd6f4">Input Password...</span></i>
  hide_input = false
  rounding = -1
  shadow_passes = 0
  shadow_size = 3
  shadow_color = rgba(0, 0, 0, 1.0)
  shadow_boost = 1.200000
  check_color = rgb(204, 136, 34)
  fail_color = rgb(204, 34, 34)
  fail_text = <i>$FAIL</i>
  fail_transition = 300
  capslock_color = -1
  numlock_color = -1
  bothlock_color = -1
  invert_numlock = false

  position = 0, -120
  halign = center
  valign = center
}


label {
  monitor = 
  text = cmd[update:1000] echo "$TIME"
  color = rgba(255, 255, 255, 0.6)
  font_size = 120
  font_family = Mononoki Nerd Font
  shadow_passes = 0
  shadow_size = 3
  shadow_color = rgba(0, 0, 0, 1.0)
  shadow_boost = 1.200000

  position = 0, -300
  halign = center
  valign = top
}

label {
  monitor = 
  text = Hello there, $USER
  color = rgba(255, 255, 255, 0.6)
  font_size = 25
  font_family = Mononoki Nerd Font
  shadow_passes = 0
  shadow_size = 3
  shadow_color = rgba(0, 0, 0, 1.0)
  shadow_boost = 1.200000

  position = 0, -40
  halign = center
  valign = center
}

label {
  monitor = 
  text = cmd[update:1000] playerctl metadata --format "{{ artist }} - {{ album }} - {{ title }}"
  color = rgba(255, 255, 255, 0.6)
  font_size = 18
  font_family = Mononoki Nerd Font
  shadow_passes = 0
  shadow_size = 3
  shadow_color = rgba(0, 0, 0, 1.0)
  shadow_boost = 1.200000

  position = 0, -50
  halign = center
  valign = bottom
}